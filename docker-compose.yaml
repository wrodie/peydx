services:
  payload-db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payload-cms:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: always
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@payload-db:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      SERVER_MANAGER_URL: ${SERVER_MANAGER_URL:-http://host.docker.internal:5556}
      SERVER_MANAGER_TOKEN: ${SERVER_MANAGER_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      payload-db:
        condition: service_healthy
    volumes:
      - media_data:/home/node/app/media

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - payload-cms

  registry:
    image: registry:2
    restart: always
    ports:
      - "5050:5000"
    volumes:
      - registry_data:/var/lib/registry

volumes:
  postgres_data:
  media_data:
  registry_data:

